---
- name: Install Apache
  apt:
    name:
      - apache2
      - libapache2-mod-proxy-html
    state: present

- name: Enable required Apache modules
  apache2_module:
    name: "{{ item }}"
    state: present
  loop:
    - proxy
    - proxy_http
    - ssl
    - headers
    - rewrite
  notify: restart apache

- name: Deploy reverse proxy vhost config
  template:
    src: reverse-proxy.conf.j2
    dest: /etc/apache2/sites-available/skg-app.conf
    mode: "0644"
  notify: restart apache

- name: Enable site and disable default
  command: "{{ item }}"
  loop:
    - a2ensite skg-app.conf
    - a2dissite 000-default.conf
  notify: restart apache

- name: Generate self-signed TLS cert
  command: >
    openssl req -x509 -nodes -days 365
    -newkey rsa:2048
    -keyout /etc/ssl/private/skg-app.key
    -out /etc/ssl/certs/skg-app.crt
    -subj "/CN=web-srv.skg.lab"
  args:
    creates: /etc/ssl/certs/skg-app.crt

- name: Ensure Apache is running
  service:
    name: apache2
    state: started
    enabled: yes
