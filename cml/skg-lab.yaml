lab:
  title: Security Knowledge Graph Lab
  description: 10-device enterprise lab for SKG demo
  notes: ''
  version: 0.2.0
annotations: []
smart_annotations: []
nodes:
  # ── Edge Router (IOSv) ──
  - id: n0
    label: edge-rtr
    node_definition: iosv
    image_definition: iosv-159-3-m8
    x: -400
    y: 0
    hide_links: false
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    ram: null
    tags: []
    parameters: {}
    configuration:
      - name: ios_config.txt
        content: |-
          hostname edge-rtr
          !
          interface GigabitEthernet0/0
           description Uplink to ISP (simulated)
           no shutdown
          !
          interface GigabitEthernet0/1
           description Downlink to edge-fw
           ip address 10.0.0.1 255.255.255.252
           no shutdown
          !
          ip route 0.0.0.0 0.0.0.0 GigabitEthernet0/0
          ip route 10.10.0.0 255.255.0.0 10.0.0.2
          !
          ip name-server 10.10.4.10
          !
          end
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/0
        type: physical
        slot: 0
      - id: i2
        label: GigabitEthernet0/1
        type: physical
        slot: 1

